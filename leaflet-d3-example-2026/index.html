<!DOCTYPE html>
<html>
<head>
    <title>Interactive map with Leaflet</title>
    <link rel="icon" href="data:;base64,iVBORwOKGO=" />
    <link rel="stylesheet" href="css/leaflet.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="my-map"></div>
    <select name="color-by" id="color-by">
        <option value="time-elapsed">Time elapsed</option>
        <option value="neighborhood">Neighborhood</option>
        <option value="priority">Priority</option>
        <option value="agency">Responding agency</option>
    </select>
    
    <script src="js/d3.v6.min.js"></script>
    <script src="js/leaflet.js"></script>


    <script src="js/main.js"></script>
    <script src="js/leafletMap.js"></script>

    <div id="tooltip"></div>

    <select id="map-type" onchange="changeMap()">
        <option value="light">Light</option>
        <option value="regular">Regular</option>
        <option value="topo">Topography</option>
    </select>

    <div id="attribute-views">
        <div id="vis1-most-requests"></div>
        <script src="js/Visualizations/vis1-most-requests.js"></script>

        <div id="vis2-common-methods"></div>
        <script src="js/Visualizations/vis2-common-methods.js"></script>

        <div id="vis3-department-requests"></div>
        <script src="js/Visualizations/vis3-department-requests.js"></script>

        <div id="vis4-priority"></div>
        <script src="js/Visualizations/vis4-priority.js"></script>
    </div>


</body>
</html>
